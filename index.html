<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❄️ برفی | چت گروهی</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: tahoma;
        }

        body {
            background: linear-gradient(135deg, #00b4ff, #6dd5fa, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            color: #00b4ff;
        }
        .header h1 {
            font-size: 30px;
        }
        .header p {
            font-size: 14px;
            color: #555;
        }

        /* ===== چت ===== */
        .chat-messages {
            height: 350px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        .chat-msg {
            padding: 8px 14px;
            margin-bottom: 6px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 15px;
        }
        .chat-msg.other {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
        }
        .chat-msg.you {
            background: #00b4ff;
            color: white;
            align-self: flex-end;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: #00b4ff;
        }
        .chat-input-area button {
            background: #00b4ff;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .chat-input-area button:hover {
            background: #008fd1;
            transform: scale(1.02);
        }

        .footer-text {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 10px;
        }

        /* ===== دکمه بازی ===== */
        .game-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            background: #f39c12;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .game-btn:hover {
            background: #e08e0b;
            transform: scale(1.02);
        }

        /* ===== صفحه بازی ===== */
        #gamePage {
            display: none;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .back-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .back-btn:hover {
            background: #e74c3c;
        }

        .game-status {
            font-size: 18px;
            margin: 10px 0 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px auto;
            max-width: 280px;
        }

        .cell {
            background: #f0f8ff;
            border-radius: 10px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
        .cell:hover:not(.taken) {
            background: #d4edff;
            transform: scale(1.02);
        }
        .cell.taken {
            cursor: default;
        }
        .cell.x {
            color: #2196F3;
        }
        .cell.o {
            color: #FF5722;
        }

        .reset-btn {
            background: #f39c12;
            margin-top: 12px;
            padding: 8px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .reset-btn:hover {
            background: #e08e0b;
        }

        /* پیام خالی */
        .empty-msg {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- ========================================================== -->
    <!-- صفحه اصلی (چت + دکمه بازی) -->
    <!-- ========================================================== -->
    <div id="homePage" class="container">
        <div class="header">
            <h1>❄️ برفی</h1>
            <p>چت گروهی لحظه‌ای</p>
        </div>

        <!-- بخش نمایش پیام‌ها -->
        <div class="chat-messages" id="chatMessages">
            <div class="empty-msg">💬 پیامی برای نمایش وجود ندارد</div>
        </div>

        <!-- بخش نوشتن و ارسال پیام -->
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="پیام خود را بنویسید..." />
            <button onclick="sendMessage()">📤 ارسال</button>
        </div>

        <!-- دکمه بازی -->
        <button class="game-btn" onclick="goToGame()">🎮 بازی دوز</button>

        <p class="footer-text">* پیام‌ها برای همه کاربران نمایش داده می‌شود.</p>
    </div>

    <!-- ========================================================== -->
    <!-- صفحه بازی -->
    <!-- ========================================================== -->
    <div id="gamePage">
        <div class="game-container">
            <button class="back-btn" onclick="goHome()">↩ بازگشت به چت</button>
            <h3 style="text-align:center; margin-top:5px;">🎯 بازی دوز</h3>
            <div class="game-status" id="statusMsg">نوبت شما (X) - شروع کنید!</div>
            <div class="board" id="board"></div>
            <button class="reset-btn" onclick="resetGame()">🔄 بازی جدید</button>
        </div>
    </div>

    <script>
        // ==========================================================
        //  ۱. تنظیمات Supabase
        // ==========================================================
        const SUPABASE_URL = "https://uyfomwdjyvkyhoolo.subspace.co";
        const SUPABASE_ANON_KEY = "sb_publishable_jGPMijQTM3BqB9tp14FUzg_Sd4RReIx";

        // ==========================================================
        //  ۲. چت
        // ==========================================================
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');

        // بارگذاری پیام‌های قبلی
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });
            if (error) {
                console.error('خطا:', error);
                return;
            }
            chatMessages.innerHTML = '';
            if (data.length === 0) {
                chatMessages.innerHTML = '<div class="empty-msg">💬 پیامی برای نمایش وجود ندارد</div>';
                return;
            }
            data.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg other';
                msgDiv.textContent = msg.text;
                chatMessages.appendChild(msgDiv);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // گوش دادن به پیام‌های جدید (Real-time)
        supabase
            .channel('messages')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages'
            }, (payload) => {
                // حذف پیام خالی
                const empty = chatMessages.querySelector('.empty-msg');
                if (empty) empty.remove();

                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg other';
                msgDiv.textContent = payload.new.text;
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            })
            .subscribe();

        // ===== تابع ارسال پیام =====
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (text === '') {
                alert('لطفاً یک پیام بنویسید!');
                return;
            }

            // نمایش پیام شما در صفحه
            const empty = chatMessages.querySelector('.empty-msg');
            if (empty) empty.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg you';
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // ارسال به Supabase
            const { error } = await supabase
                .from('messages')
                .insert([{ text: text }]);

            if (error) {
                console.error('خطا در ارسال:', error);
                alert('خطا در ارسال پیام');
                return;
            }

            chatInput.value = ''; // خالی کردن فیلد
        }

        // ارسال با دکمه Enter
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ==========================================================
        //  ۳. بازی دوز
        // ==========================================================
        const boardEl = document.getElementById('board');
        const statusMsg = document.getElementById('statusMsg');
        let board = Array(9).fill('');
        let currentPlayer = 'X';
        let gameOver = false;
        let isRobotTurn = false;
        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        function renderBoard() {
            boardEl.innerHTML = '';
            board.forEach((val, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (val) {
                    cell.classList.add('taken', val === 'X' ? 'x' : 'o');
                    cell.textContent = val;
                } else {
                    cell.dataset.index = idx;
                    cell.addEventListener('click', () => handleHumanMove(idx));
                }
                boardEl.appendChild(cell);
            });
        }

        function checkWinner() {
            for (let p of winPatterns) {
                const [a, b, c] = p;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            if (board.every(v => v !== '')) return 'draw';
            return null;
        }

        function endGame(result) {
            gameOver = true;
            if (result === 'X') statusMsg.textContent = '🎉 شما برنده شدید!';
            else if (result === 'O') statusMsg.textContent = '🤖 ربات برنده شد!';
            else if (result === 'draw') statusMsg.textContent = '🤝 مساوی!';
            document.querySelectorAll('.cell:not(.taken)').forEach(c => c.classList.add('taken'));
        }

        function handleHumanMove(index) {
            if (gameOver || isRobotTurn || board[index] !== '' || currentPlayer !== 'X') return;
            board[index] = 'X';
            renderBoard();
            const winner = checkWinner();
            if (winner) { endGame(winner); return; }
            currentPlayer = 'O';
            isRobotTurn = true;
            statusMsg.textContent = '🤖 ربات در حال فکر...';
            setTimeout(robotMove, 500);
        }

        function robotMove() {
            if (gameOver) { isRobotTurn = false; return; }
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    if (checkWinner() === 'O') { applyRobotMove(i); return; }
                    board[i] = '';
                }
            }
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'X';
                    if (checkWinner() === 'X') {
                        board[i] = '';
                        applyRobotMove(i);
                        return;
                    }
                    board[i] = '';
                }
            }
            const empty = board.reduce((acc, v, idx) => v === '' ? [...acc, idx] : acc, []);
            if (empty.length === 0) { isRobotTurn = false; return; }
            const randIdx = empty[Math.floor(Math.random() * empty.length)];
            applyRobotMove(randIdx);
        }

        function applyRobotMove(index) {
            board[index] = 'O';
            renderBoard();
            const winner = checkWinner();
            if (winner) { endGame(winner);
                isRobotTurn = false; return; }
            currentPlayer = 'X';
            isRobotTurn = false;
            statusMsg.textContent = 'نوبت شما (X)';
        }

        function startGame() {
            board = Array(9).fill('');
            gameOver = false;
            currentPlayer = 'X';
            isRobotTurn = false;
            renderBoard();
            statusMsg.textContent = 'نوبت شما (X) - شروع کنید!';
        }

        function resetGame() { startGame(); }

        // ==========================================================
        //  ۴. نمایش صفحات
        // ==========================================================
        function showPage(pageId) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';

            if (pageId === 'homePage') {
                loadMessages();
            }
        }

        function goToGame() {
            showPage('gamePage');
            startGame();
        }

        function goHome() {
            showPage('homePage');
        }

        // نمایش صفحه اصلی هنگام بارگذاری
        showPage('homePage');
    </script>
</body>
</html>
