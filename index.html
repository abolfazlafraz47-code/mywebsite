<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت غیرفعال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: tahoma;
        }

        body {
            background: linear-gradient(135deg, #00b4ff, #6dd5fa, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 25px;
            padding: 50px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .sub {
            font-size: 18px;
            color: #555;
            margin-bottom: 10px;
        }

        .sub2 {
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⛔</div>
        <div class="title">سایت غیرفعال است</div>
        <div class="sub">به زودی فعال می‌شود</div>
        <div class="sub2">❄️ برفی</div>
    </div>

</body>
</html>
