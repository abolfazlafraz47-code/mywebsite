<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❄️ برفی</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: tahoma;
}

body {
    background: linear-gradient(135deg, #00b4ff, #6dd5fa, #ffffff);
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

header {
    text-align: center;
    margin-bottom: 30px;
    color: white;
}

header h1 {
    font-size: 55px;
}

header p {
    font-size: 20px;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.box h2 {
    margin-bottom: 10px;
}

.box p {
    margin-bottom: 20px;
    color: #555;
}

button {
    background: #00b4ff;
    color: white;
    border: none;
    padding: 12px 35px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #008fd1;
    transform: scale(1.05);
}

#soon {
    display: none;
    margin-top: 20px;
    font-size: 24px;
    font-weight: bold;
    color: #00b4ff;
}

.dots::after {
    content: "";
    animation: dots 1.5s infinite;
}

@keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
    100% { content: ""; }
}
</style>

</head>
<body>

<header>
    <h1>❄️ برفی</h1>
    <p>به سایت برفی خوش آمدید</p>
</header>

<div class="box">
    <h2>👋 سلام!</h2>
    <p>این یک سایت زیبا و ساده است.</p>
    <button onclick="showSoon()">🚀 شروع</button>
    <p id="soon">
        به زودی <span class="dots"></span>
    </p>
</div>

<script>
function showSoon() {
    document.getElementById("soon").style.display = "block";
}
</script>

</body>
</html>
