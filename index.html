<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❄️ برفی</title>
    <style>
        /* ===== ریست و پایه ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: tahoma;
        }

        body {
            background: linear-gradient(135deg, #00b4ff, #6dd5fa, #ffffff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* ===== صفحه لودینگ ===== */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 25px;
            padding: 40px 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
            min-height: 300px;
        }
        #loader .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e0e0e0;
            border-top: 6px solid #00b4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loader .loading-text {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }
        #loader .dots::after {
            content: '';
            display: inline-block;
            width: 30px;
            text-align: left;
            animation: dots 1.5s infinite steps(1);
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
        #loader .sub-text {
            color: #888;
            font-size: 14px;
        }

        /* ===== صفحه خطا ===== */
        #errorPage {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 25px;
            padding: 40px 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
            min-height: 300px;
        }
        #errorPage .error-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        #errorPage .error-title {
            font-size: 22px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 8px;
        }
        #errorPage .error-desc {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }
        #errorPage .retry-btn {
            background: #00b4ff;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #errorPage .retry-btn:hover {
            background: #008fd1;
            transform: scale(1.05);
        }

        /* ===== محتوای اصلی ===== */
        #mainContent {
            display: none;
            width: 100%;
        }

        /* ===== استایل‌های اصلی ===== */
        header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        header h1 {
            font-size: 55px;
        }
        header p {
            font-size: 20px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .box h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        .box p {
            margin-bottom: 20px;
            color: #555;
            font-size: 16px;
        }
        button {
            background: #00b4ff;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #008fd1;
            transform: scale(1.05);
        }

        #menuPage, #gamePage {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .menu-box {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .menu-box h2 {
            font-size: 28px;
            margin-bottom: 25px;
        }
        .menu-box button {
            width: 80%;
            margin: 8px auto;
            font-size: 20px;
        }
        .menu-box p {
            font-size: 22px;
            margin: 15px 0;
            color: #333;
        }

        .game-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #e74c3c;
            transform: scale(1.05);
        }

        /* ===== تایمر ===== */
        .timer-container {
            text-align: center;
            margin: 10px 0 5px 0;
        }
        .timer {
            display: inline-block;
            background: #2d2d44;
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            padding: 4px 20px;
            border-radius: 30px;
            min-width: 80px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }
        .timer.warning {
            color: #ff6b6b;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .game-status {
            font-size: 18px;
            margin: 5px 0 10px 0;
            text-align: center;
            font-weight: bold;
            color: #333;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px auto;
            max-width: 280px;
        }

        .cell {
            background: #f0f8ff;
            border-radius: 10px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
        .cell:hover:not(.taken) {
            background: #d4edff;
            transform: scale(1.02);
        }
        .cell.taken {
            cursor: default;
        }
        .cell.x {
            color: #2196F3;
        }
        .cell.o {
            color: #FF5722;
        }

        .reset-btn {
            background: #f39c12;
            margin-top: 12px;
            padding: 8px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .reset-btn:hover {
            background: #e08e0b;
        }

        @media(max-width: 480px) {
            header h1 { font-size: 40px; }
            .box { width: 90%; }
            .menu-box button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="page-container">

        <!-- ======== صفحه لودینگ ======== -->
        <div id="loader">
            <div class="spinner"></div>
            <div class="loading-text">در حال اتصال<span class="dots"></span></div>
            <div class="sub-text">لطفاً منتظر بمانید...</div>
        </div>

        <!-- ======== صفحه خطا ======== -->
        <div id="errorPage">
            <div class="error-icon">📡</div>
            <div class="error-title">اتصال خود را چک کنید</div>
            <div class="error-desc">امکان برقراری ارتباط با سرور وجود ندارد.</div>
            <button class="retry-btn" onclick="retryConnection()">🔄 تلاش مجدد</button>
        </div>

        <!-- ======== محتوای اصلی ======== -->
        <div id="mainContent">

            <!-- صفحه اصلی -->
            <div id="homePage">
                <header>
                    <h1>❄️ برفی</h1>
                    <p>به سایت برفی خوش آمدید</p>
                </header>
                <div class="box">
                    <h2>👋 سلام!</h2>
                    <p>خوش آمدید.</p>
                    <button onclick="goToMenu()">🚀 شروع</button>
                </div>
            </div>

            <!-- صفحه منوی بازی -->
            <div id="menuPage">
                <div class="menu-box">
                    <h2>🎮 بازی‌ها</h2>
                    <p>⚽ دوز آفلاین با ربات</p>
                    <button onclick="goToGame()">🚪 ورود به بازی</button>
                    <br><br>
                    <button style="background:#aaa;" onclick="goHome()">🔙 بازگشت به صفحه اصلی</button>
                </div>
            </div>

            <!-- صفحه بازی دوز -->
            <div id="gamePage">
                <div class="game-container">
                    <button class="back-btn" onclick="goHome()">↩ بازگشت</button>
                    <h3 style="text-align:center; margin-top:5px;">🎯 بازی دوز</h3>

                    <!-- نمایش تایمر -->
                    <div class="timer-container">
                        <div class="timer" id="timerDisplay">⏱ 20</div>
                    </div>

                    <div class="game-status" id="statusMsg">نوبت شما (X) - شروع کنید!</div>
                    <div class="board" id="board"></div>
                    <button class="reset-btn" onclick="resetGame()">🔄 بازی جدید</button>
                </div>
            </div>

        </div><!-- /mainContent -->
    </div><!-- /page-container -->

    <script>
        // ==========================================================
        //  ۱. مدیریت لودینگ و اتصال
        // ==========================================================
        const loader = document.getElementById('loader');
        const errorPage = document.getElementById('errorPage');
        const mainContent = document.getElementById('mainContent');

        function checkConnection() {
            return new Promise((resolve) => {
                if (!navigator.onLine) {
                    resolve(false);
                    return;
                }
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                fetch('https://httpbin.org/get', {
                        method: 'HEAD',
                        mode: 'no-cors',
                        signal: controller.signal,
                    })
                    .then(() => {
                        clearTimeout(timeoutId);
                        resolve(true);
                    })
                    .catch(() => {
                        clearTimeout(timeoutId);
                        resolve(false);
                    });
            });
        }

        async function initConnection() {
            loader.style.display = 'flex';
            errorPage.style.display = 'none';
            mainContent.style.display = 'none';

            const isConnected = await checkConnection();

            if (isConnected) {
                loader.style.display = 'none';
                mainContent.style.display = 'block';
                showPage('homePage');
            } else {
                loader.style.display = 'none';
                errorPage.style.display = 'flex';
            }
        }

        function retryConnection() {
            initConnection();
        }

        // ==========================================================
        //  ۲. بازی دوز + تایمر + صداها
        // ==========================================================
        const boardEl = document.getElementById('board');
        const statusMsg = document.getElementById('statusMsg');
        const timerDisplay = document.getElementById('timerDisplay');

        let board = Array(9).fill('');
        let currentPlayer = 'X';
        let gameOver = false;
        let isRobotTurn = false;
        let timerInterval = null;
        let timeLeft = 20;
        const MAX_TIME = 20;

        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        // ===== صداها =====
        function playWinSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const notes = [
                    { freq: 523, duration: 0.15 },
                    { freq: 659, duration: 0.15 },
                    { freq: 784, duration: 0.15 },
                    { freq: 1047, duration: 0.25 },
                ];
                notes.forEach((note, index) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = note.freq;
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime + index * 0.12);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + index * 0.12 + note.duration);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + index * 0.12);
                    osc.stop(audioCtx.currentTime + index * 0.12 + note.duration);
                });
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.value = 1200;
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.5);
                }, 400);
            } catch (e) { /* بی‌صدا */ }
        }

        function playLoseSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const notes = [
                    { freq: 500, duration: 0.3 },
                    { freq: 450, duration: 0.3 },
                    { freq: 400, duration: 0.3 },
                    { freq: 350, duration: 0.5 },
                ];
                notes.forEach((note, index) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = note.freq;
                    gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime + index * 0.25);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + index * 0.25 + note.duration);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + index * 0.25);
                    osc.stop(audioCtx.currentTime + index * 0.25 + note.duration);
                });
            } catch (e) { /* بی‌صدا */ }
        }

        // ===== تایمر =====
        function startTimer() {
            clearTimer();
            timeLeft = MAX_TIME;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 5) {
                    timerDisplay.classList.add('warning');
                } else {
                    timerDisplay.classList.remove('warning');
                }

                if (timeLeft <= 0) {
                    clearTimer();
                    timerDisplay.classList.remove('warning');
                    // تایمر تموم شد → نوبت عوض میشه
                    if (!gameOver && !isRobotTurn && currentPlayer === 'X') {
                        // نوبت کاربر بود و تموم شد → نوبت ربات
                        statusMsg.textContent = '⏰ زمان شما تمام شد! نوبت ربات...';
                        currentPlayer = 'O';
                        isRobotTurn = true;
                        setTimeout(() => {
                            if (!gameOver) robotMove();
                        }, 300);
                    } else if (!gameOver && isRobotTurn && currentPlayer === 'O') {
                        // نوبت ربات بود و تموم شد (احتمالاً ربات کار نمیکنه) → نوبت کاربر
                        statusMsg.textContent = '⏰ زمان ربات تمام شد! نوبت شما...';
                        currentPlayer = 'X';
                        isRobotTurn = false;
                        startTimer(); // تایمر جدید برای کاربر
                    }
                }
            }, 1000);
        }

        function clearTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerDisplay.classList.remove('warning');
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = '⏱ ' + timeLeft;
        }

        function resetTimer() {
            clearTimer();
            timeLeft = MAX_TIME;
            updateTimerDisplay();
            timerDisplay.classList.remove('warning');
            startTimer();
        }

        // ===== توابع بازی =====
        function renderBoard() {
            boardEl.innerHTML = '';
            board.forEach((val, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (val) {
                    cell.classList.add('taken', val === 'X' ? 'x' : 'o');
                    cell.textContent = val;
                } else {
                    cell.dataset.index = idx;
                    cell.addEventListener('click', () => handleHumanMove(idx));
                }
                boardEl.appendChild(cell);
            });
        }

        function checkWinner() {
            for (let p of winPatterns) {
                const [a, b, c] = p;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            if (board.every(v => v !== '')) return 'draw';
            return null;
        }

        function endGame(result) {
            gameOver = true;
            clearTimer();

            if (result === 'X') {
                playWinSound();
                statusMsg.textContent = '🎉 شما برنده شدید!';
            } else if (result === 'O') {
                playLoseSound();
                statusMsg.textContent = '🤖 ربات برنده شد!';
            } else if (result === 'draw') {
                statusMsg.textContent = '🤝 مساوی!';
            }
            document.querySelectorAll('.cell:not(.taken)').forEach(c => c.classList.add('taken'));
        }

        function handleHumanMove(index) {
            if (gameOver || isRobotTurn || board[index] !== '' || currentPlayer !== 'X') return;

            board[index] = 'X';
            renderBoard();
            const winner = checkWinner();
            if (winner) { endGame(winner); return; }

            currentPlayer = 'O';
            isRobotTurn = true;
            statusMsg.textContent = '🤖 ربات در حال فکر...';
            clearTimer(); // تایمر کاربر متوقف شد
            setTimeout(() => {
                if (!gameOver) {
                    robotMove();
                }
            }, 500);
        }

        function robotMove() {
            if (gameOver) { isRobotTurn = false; return; }

            // حرکت ربات
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    if (checkWinner() === 'O') { applyRobotMove(i); return; }
                    board[i] = '';
                }
            }
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'X';
                    if (checkWinner() === 'X') {
                        board[i] = '';
                        applyRobotMove(i);
                        return;
                    }
                    board[i] = '';
                }
            }
            const empty = board.reduce((acc, v, idx) => v === '' ? [...acc, idx] : acc, []);
            if (empty.length === 0) { isRobotTurn = false; return; }
            const randIdx = empty[Math.floor(Math.random() * empty.length)];
            applyRobotMove(randIdx);
        }

        function applyRobotMove(index) {
            board[index] = 'O';
            renderBoard();
            const winner = checkWinner();
            if (winner) { endGame(winner);
                isRobotTurn = false; return; }

            currentPlayer = 'X';
            isRobotTurn = false;
            statusMsg.textContent = 'نوبت شما (X)';
            resetTimer(); // تایمر جدید برای کاربر
        }

        function startGame() {
            board = Array(9).fill('');
            gameOver = false;
            currentPlayer = 'X';
            isRobotTurn = false;
            renderBoard();
            statusMsg.textContent = 'نوبت شما (X) - شروع کنید!';
            clearTimer();
            timeLeft = MAX_TIME;
            updateTimerDisplay();
            timerDisplay.classList.remove('warning');
            startTimer();
        }

        function resetGame() {
            startGame();
        }

        // ==========================================================
        //  ۳. نمایش صفحات
        // ==========================================================
        function showPage(pageId) {
            const home = document.getElementById('homePage');
            const menu = document.getElementById('menuPage');
            const game = document.getElementById('gamePage');
            home.style.display = 'none';
            menu.style.display = 'none';
            game.style.display = 'none';
            document.getElementById(pageId).style.display = 'flex';
        }

        function goToMenu() { showPage('menuPage'); }

        function goToGame() {
            showPage('gamePage');
            startGame();
        }

        function goHome() {
            clearTimer();
            showPage('homePage');
        }

        // ==========================================================
        //  ۴. شروع برنامه
        // ==========================================================
        window.addEventListener('load', () => {
            initConnection();
        });
    </script>

</body>
</html>
